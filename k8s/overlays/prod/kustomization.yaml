apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: circleguard-prod

resources:
  - ../../services

images:
  - name: localhost:5000/circleguard/auth-service
    newTag: prod-latest
  - name: localhost:5000/circleguard/identity-service
    newTag: prod-latest
  - name: localhost:5000/circleguard/gateway-service
    newTag: prod-latest
  - name: localhost:5000/circleguard/promotion-service
    newTag: prod-latest
  - name: localhost:5000/circleguard/dashboard-service
    newTag: prod-latest
  - name: localhost:5000/circleguard/file-service
    newTag: prod-latest

patches:
  # -----------------------------------------------------------------
  # DDL: switch from "update" (auto-migrate) to "validate" (safe).
  # Prevents Hibernate from silently altering the production schema.
  # Run Flyway migrations separately before deploying.
  # -----------------------------------------------------------------
  - target:
      kind: ConfigMap
      name: circleguard-auth-config
    patch: |-
      - op: replace
        path: /data/SPRING_JPA_HIBERNATE_DDL_AUTO
        value: validate
  - target:
      kind: ConfigMap
      name: circleguard-identity-config
    patch: |-
      - op: replace
        path: /data/SPRING_JPA_HIBERNATE_DDL_AUTO
        value: validate
  - target:
      kind: ConfigMap
      name: circleguard-promotion-config
    patch: |-
      - op: replace
        path: /data/SPRING_JPA_HIBERNATE_DDL_AUTO
        value: validate
  - target:
      kind: ConfigMap
      name: circleguard-dashboard-config
    patch: |-
      - op: replace
        path: /data/SPRING_JPA_HIBERNATE_DDL_AUTO
        value: validate

  # -----------------------------------------------------------------
  # Replicas: scale up traffic-facing and graph services for prod.
  # auth, gateway, promotion → 2 replicas each.
  # -----------------------------------------------------------------
  - target:
      kind: Deployment
      name: circleguard-auth
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: circleguard-gateway
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: circleguard-promotion
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
