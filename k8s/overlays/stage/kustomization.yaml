apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: circleguard-stage

resources:
  - ../../services

images:
  - name: localhost:5000/circleguard/auth-service
    newTag: stage-latest
  - name: localhost:5000/circleguard/identity-service
    newTag: stage-latest
  - name: localhost:5000/circleguard/gateway-service
    newTag: stage-latest
  - name: localhost:5000/circleguard/promotion-service
    newTag: stage-latest
  - name: localhost:5000/circleguard/dashboard-service
    newTag: stage-latest
  - name: localhost:5000/circleguard/file-service
    newTag: stage-latest
