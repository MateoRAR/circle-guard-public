# Locust default configuration for headless CI runs
# Override host per scenario via --host flag

headless = true
users = 100
spawn-rate = 10
run-time = 120s
html = locust-report.html

# To run a specific scenario:
# locust -f locustfile.py AuthLoadTest --host=http://localhost:8180
# locust -f locustfile.py GatewayLoadTest --host=http://localhost:8087
# locust -f locustfile.py PromotionStatsLoadTest --host=http://localhost:8088
# locust -f locustfile.py DashboardLoadTest --host=http://localhost:8084
